name: Linux Packager
run-name: Package microstack for Linux by @${{ github.actor }}

env:
  VERSION: 26a
  ASSETS_VERSION: 26a
  RELEASEVERSION: ${{ github.ref_name }}
  SOLUTION_FILE_PATH: .

on:
  workflow_dispatch:
  release:
    types: [created]
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Format repo name as lowercase
      uses: actions/github-script@v6 # Use the latest version
      id: repo_lc
      with:
        result-encoding: string
        script: return `ghcr.io/${github.repository.toLowerCase()}`

    - name: setup vars
      run: |
        echo "ZipFile=microstack-26a-x86_64.zip" >> $GITHUB_ENV      
        echo "SHA_SHORT=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"
        echo "BUILDDATE=$(date +'%Y-%m-%dT%H%M%S')" >> $GITHUB_ENV
        echo "GitHubRepository=${{ steps.repo_lc.outputs.result }}" >> $GITHUB_ENV
      shell: bash

    - name: install hdf5 and libtiff
      run: |
        sudo apt-get update 
        sudo apt-get -y install libtiff-dev libhdf5-dev
        
    - name: make
      run: InstallDir=microstack26a_linux_x86_64 make -j install
        
    - name: make docker
      run: |
        make -j docker

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3    
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: push docker to ghcr
      run: |
        make push

    - name: Save Package Folder as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: microstack-${{env.BUILDDATE}}-${{ env.SHA_SHORT }}
        path: microstack26a_linux_x86_64
        overwrite: true  
        
    - name: Save Package Folder as Zip for Release
      if: github.event_name == 'release'
      run: |
        zip -r ${{env.ZipFile}} microstack26a_linux_x86_64

    - name: Publish ${{ env.Package }}
      if: github.event_name == 'release'
      uses: ncipollo/release-action@v1
      with:
        artifacts: "${{env.ZipFile}}" 
        tag: ${{ env.RELEASEVERSION }}       
        allowUpdates: true

    - name: Publish ${{ env.Package }}
      if: github.event_name == 'release'
      uses: ncipollo/release-action@v1
      with:
        artifacts: "${{ env.Package }}"
        tag: ${{ env.RELEASEVERSION }}       
        allowUpdates: true

